<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Sharanya Chaturvedi</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0e; color: #e5e7eb; font-family: Inter, Arial, sans-serif; -webkit-font-smoothing: antialiased; padding: 24px; overflow: hidden; }
    .glow { position: fixed; width: 60vw; height: 60vh; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,157,0.08) 0%, transparent 70%); top: 20%; left: 20%; pointer-events: none; }
    .wrap { text-align: center; position: relative; max-width: 560px; }
    .num { font-family: 'Instrument Serif', Georgia, serif; font-size: clamp(96px, 20vw, 160px); line-height: 1; background: linear-gradient(135deg, #FF6B9D, #962EFF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    h1 { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; font-size: clamp(24px, 5vw, 34px); color: #f3f4f6; margin-bottom: 14px; }
    p { font-size: 15px; color: #9ca3af; line-height: 1.7; margin-bottom: 32px; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a.primary { background: #fff; color: #000; font-size: 14px; font-weight: 700; padding: 13px 26px; border-radius: 12px; text-decoration: none; transition: background .2s; }
    a.primary:hover { background: #e5e7eb; }
    a.ghost { border: 1px solid rgba(255,255,255,0.2); color: #d1d5db; font-size: 14px; font-weight: 700; padding: 13px 26px; border-radius: 12px; text-decoration: none; transition: all .2s; }
    a.ghost:hover { border-color: rgba(255,107,157,0.5); color: #FF6B9D; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="num">404</div>
    <h1>This page shipped to the wrong address.</h1>
    <p>Even good PMs lose a page to scope creep sometimes. The work you're looking for is safe on the homepage.</p>
    <div class="btns">
      <a class="primary" href="/">← Back to the portfolio</a>
      <a class="ghost" href="mailto:chaturvedisharanya@gmail.com">Report a broken link</a>
    </div>
  </div>
</body>
</html>
